<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">

    <title>RIYAS_OS | V28 Industrial</title>

    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://www.gstatic.com">

    <link rel="icon"
        href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==">

    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./greeting.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>

<body>
    <canvas id="stage"></canvas>

    <div id="ui-layer">

        <div id="hero-name-viewport" class="top-center"></div>

        <div id="hud-header" class="hud-panel top-center">
            <div class="hud-subtitle">SYSTEM // ONLINE</div>
            <div id="hud-sector-title" class="glitch-text" data-text="SECTOR // VOID">SECTOR // VOID</div>
        </div>

        <div id="hud-footer" class="hud-panel bottom-center">
            <div class="progress-track">
                <div id="hud-progress-fill" class="progress-fill"></div>
            </div>
            <div class="footer-status">
                <span id="coordinates">X: 00.00° Y: 00.00</span>
                <span class="blink">_SYNCED</span>
            </div>
        </div>

        <div id="terminal-window" class="terminal-window">
            <div id="terminal-header" class="terminal-header">
                <span>RIYAS_OS // SYSTEM_TERMINAL</span>
                <span class="terminal-close">×</span>
            </div>
            <div id="terminal-content" class="terminal-content"></div>
            <div class="terminal-input-wrap">
                <span>></span>
                <input type="text" id="terminal-input" spellcheck="false" autocomplete="off">
            </div>
        </div>

        <div id="interaction-hint" class="hint-overlay">
            <div class="hint-icon">↔</div>
            <div class="hint-text">DRAG TO ORBIT</div>
        </div>

    </div>

    <div id="hologram-viewport" class="hidden"></div>

    <div id="os-greeting" class="boot-overlay">
        <div id="system-stats"></div>

        <div id="boot-terminal" class="boot-terminal">
        </div>

        <button id="btn-enter-system" class="btn-primary">INITIALIZE SYSTEM</button>
    </div>

    <script type="module" src="./main.js"></script>

</body>

</html>
